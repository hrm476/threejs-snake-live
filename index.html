<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="Snake 3D" />
    <meta name="description" content="A simple 3D snake indie game!" />
    <meta property="og:description" content="A simple 3D snake indie game!" />
    <meta property="og:url" content="https://snake3d.vercel.app/" />
    <meta property="og:image" content="/og-preview.png" />
    <link href="styles.css" rel="stylesheet" />
    <title>Snake 3D Game</title>
  </head>
  <body>
    <audio
      id="audio"
      class="audio-icon"
      controls
      loop="true"
      src="/snake-3d-short-audio.mp3"
    ></audio>

    <button id="btn-play" class="play-icon">
      <img
        id="btn-play-img"
        class="play-icon-img"
        src="/btn-play-bg-green.png"
      />
      <span class="play-icon-text">play</span>
    </button>

    <button id="btn-volume" class="volume-icon">
      <div class="volume-icon-box"></div>
      <img class="volume-icon-img" src="/btn-volume.svg" />
      <span class="volume-icon-text">mute</span>
    </button>

    <ul class="palette-list">
      <li data-color="green" class="palette-list-item">
        <img class="palette-list-icon" src="/palette-green.png" />
      </li>
      <li data-color="orange" class="palette-list-item">
        <img class="palette-list-icon" src="/palette-orange.png" />
      </li>
      <li data-color="lilac" class="palette-list-item">
        <img class="palette-list-icon" src="/palette-lilac.png" />
      </li>
    </ul>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
